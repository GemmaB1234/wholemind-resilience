<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WholeMind Resilience | Preventive Wellbeing for People, Teams & Systems</title>
<meta name="description" content="Evidence-based programmes to support mental wellbeing, reduce stress and build resilience for individuals, communities, teams and systems." />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- React + Babel (no build step, same pattern as Anchor/Steady) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root{
    /* Brand colours per Business Identity Map V1.2 — accent (--sage) is a
       placeholder until Colour Scheme 1 vs 3 is finalised */
    --bg:#F8F4F0;
    --bg-soft:#F0EAE1;
    --ink:#2C3E50;
    --muted:#5C6B78;
    --sage:#4E6B60;
    --sage-deep:#3A4F46;
    --plum:#7C5D74;
    --gold:#C9992B;
    --line:#E1D9CC;
    --card:#FFFFFF;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Open Sans',sans-serif; line-height:1.6;}
  h1,h2,h3{font-family:'Playfair Display',serif; font-weight:600; margin:0 0 .5em;}
  a{color:inherit;}
  button{font-family:'Open Sans',sans-serif; cursor:pointer;}
  .container{max-width:960px; margin:0 auto; padding:0 24px;}

  /* NAV */
  nav.site-nav{
    position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line);
    z-index:50;
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    max-width:960px; margin:0 auto; padding:16px 24px;
  }
  .logo{font-family:'Playfair Display',serif; font-weight:700; font-size:19px; color:var(--sage-deep); cursor:pointer; background:none; border:none;}
  .nav-links{display:flex; gap:22px; list-style:none; margin:0; padding:0; flex-wrap:wrap;}
  .nav-links button{
    background:none; border:none; font-size:14.5px; font-weight:600; color:var(--ink);
    padding:6px 0; border-bottom:2px solid transparent;
  }
  .nav-links button.active, .nav-links button:hover{border-bottom-color:var(--gold); color:var(--sage-deep);}
  @media (max-width:760px){ .nav-links{gap:14px; font-size:13px;} }

  /* HERO / SECTIONS */
  .hero{text-align:center; padding:80px 24px 60px;}
  .eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--plum); font-weight:700; margin-bottom:14px;}
  .hero h1{font-size:clamp(28px,4vw,42px); color:var(--sage-deep); max-width:720px; margin:0 auto 14px;}
  .hero p.sub{color:var(--muted); font-size:17px; max-width:560px; margin:0 auto;}

  .audience-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:40px 24px 80px; max-width:960px; margin:0 auto;}
  @media (max-width:760px){ .audience-grid{grid-template-columns:1fr;} }
  .audience-card{
    background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:28px 22px; text-align:center; cursor:pointer; transition:transform .15s, box-shadow .15s;
  }
  .audience-card:hover{transform:translateY(-2px); box-shadow:0 8px 20px rgba(43,42,36,0.06);}
  .audience-card h3{font-size:17px; color:var(--sage-deep); margin-bottom:8px;}
  .audience-card p{font-size:13.5px; color:var(--muted); margin:0;}

  .page{padding:56px 24px 100px;}
  .page-header{max-width:720px; margin:0 auto 48px; text-align:center;}
  .page-header .eyebrow{margin-bottom:10px;}
  .page-header h1{font-size:clamp(26px,3.4vw,36px); color:var(--sage-deep);}
  .page-header p{color:var(--muted); font-size:16px;}

  /* COLLAPSIBLE (About) */
  .accordion{max-width:760px; margin:0 auto;}
  .acc-item{border-bottom:1px solid var(--line);}
  .acc-head{
    width:100%; background:none; border:none; text-align:left; padding:20px 0;
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:var(--sage-deep);
  }
  .acc-head .plus{font-size:20px; color:var(--gold);}
  .acc-body{padding:0 0 22px; font-size:15px; color:var(--ink); max-width:680px; white-space:pre-line;}

  /* PROGRAMME TOGGLES */
  .toggle-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:44px;}
  .toggle-btn{
    padding:10px 18px; border-radius:24px; border:1px solid var(--line); background:var(--card);
    font-size:14px; font-weight:600; color:var(--ink);
  }
  .toggle-btn.active{background:var(--sage); border-color:var(--sage); color:#fff;}
  .prog-block{max-width:720px; margin:0 auto 60px; scroll-margin-top:100px;}
  .prog-block h2{font-size:22px; color:var(--sage-deep); margin-bottom:12px;}
  .prog-block p{font-size:15px; margin-bottom:14px;}
  .cta-btn{
    display:inline-block; margin-top:8px; padding:12px 22px; background:var(--gold); color:#2B2A24;
    border:none; border-radius:8px; font-weight:700; font-size:14.5px;
  }
  .cta-btn.outline{background:none; border:1.5px solid var(--sage); color:var(--sage-deep);}

  /* EVENTS / CARDS */
  .session-list{max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:14px;}
  .session-card{
    display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;
    background:var(--card); border:1px solid var(--line); border-left:5px solid var(--sage);
    border-radius:10px; padding:18px 20px;
  }
  .session-card.online{border-left-color:var(--plum);}
  .session-card h4{font-size:15.5px; margin-bottom:4px;}
  .session-card .meta{font-size:13px; color:var(--muted);}

  /* PASSWORD GATE */
  .gate{max-width:420px; margin:100px auto; text-align:center;}
  .gate input{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:8px; font-size:15px; margin:14px 0;
  }
  .gate .error{color:#B14A3B; font-size:13.5px;}

  footer.site-footer{border-top:1px solid var(--line); padding:40px 24px 30px; text-align:center; color:var(--muted); font-size:13px;}
  footer.site-footer .foot-links{display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; font-size:13px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app.js"></script>
</body>
</html>
