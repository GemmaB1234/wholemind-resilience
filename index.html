<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>WholeMind Resilience | Preventive Wellbeing for People, Teams & Systems</title>
<meta name="description" content="Evidence-based programmes to support mental wellbeing, reduce stress and build resilience for individuals, communities, teams and systems." />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- React + Babel (no build step, same pattern as Anchor/Steady) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
  :root{
    /* Brand colours per Business Identity Map V1.2, warmed up and
       given a second accent (clay) so it reads less "safe corporate" */
    --bg:#F8F4F0;
    --bg-soft:#F0EAE1;
    --ink:#2C3E50;
    --muted:#5C6B78;
    --sage:#4F7A67;
    --sage-deep:#33544A;
    --sage-tint:#E7EFE9;
    --plum:#8A5F80;
    --gold:#D9A441;
    --gold-tint:#FBF0DC;
    --clay:#C4623F;
    --clay-tint:#F6E4DC;
    --line:#E1D9CC;
    --card:#FFFFFF;
    --radius:22px;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--ink); font-family:'Open Sans',sans-serif; line-height:1.6;}
  h1,h2,h3{font-family:'Playfair Display',serif; font-weight:600; margin:0 0 .5em;}
  a{color:inherit;}
  button{font-family:'Open Sans',sans-serif; cursor:pointer;}
  .container{max-width:960px; margin:0 auto; padding:0 24px;}

  /* NAV */
  nav.site-nav{
    position:sticky; top:0; background:var(--bg); border-bottom:1px solid var(--line);
    z-index:50;
  }
  .nav-inner{
    display:flex; align-items:center; justify-content:space-between;
    max-width:960px; margin:0 auto; padding:14px 24px;
  }
  .logo{
    font-family:'Playfair Display',serif; font-weight:700; font-size:19px; color:var(--sage-deep);
    cursor:pointer; background:none; border:none; display:flex; align-items:center; gap:10px;
  }
  .logo img, .logo .logo-mark{ height:34px; width:34px; display:block; }
  .nav-links{display:flex; gap:22px; list-style:none; margin:0; padding:0; flex-wrap:wrap;}
  .nav-links button{
    background:none; border:none; font-size:14.5px; font-weight:600; color:var(--ink);
    padding:6px 0; border-bottom:2px solid transparent;
  }
  .nav-links button.active, .nav-links button:hover{border-bottom-color:var(--gold); color:var(--sage-deep);}
  @media (max-width:760px){ .nav-links{gap:14px; font-size:13px;} }

  /* HERO / SECTIONS */
  .hero{text-align:center; padding:76px 24px 50px; position:relative; overflow:hidden;}
  .hero .blob{
    position:absolute; z-index:0; opacity:.5; pointer-events:none;
  }
  .hero .blob.b1{ top:-60px; left:-80px; width:220px; height:220px; background:var(--gold-tint); border-radius:60% 40% 55% 45% / 45% 55% 40% 60%; }
  .hero .blob.b2{ bottom:-90px; right:-60px; width:260px; height:260px; background:var(--sage-tint); border-radius:45% 55% 40% 60% / 55% 45% 60% 40%; }
  .hero > *{ position:relative; z-index:1; }
  .eyebrow{font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--plum); font-weight:700; margin-bottom:14px;}
  .hero h1{font-size:clamp(28px,4vw,42px); color:var(--sage-deep); max-width:720px; margin:0 auto 14px;}
  .hero p.sub{color:var(--muted); font-size:17px; max-width:560px; margin:0 auto;}

  /* FULL-WIDTH COLOUR BANDS */
  .band{ width:100%; }
  .band-sage{ background:var(--sage-tint); }
  .band-gold{ background:var(--gold-tint); }
  .band-cream{ background:var(--bg); }
  .band-inner{ max-width:980px; margin:0 auto; padding:64px 24px; }

  .audience-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:24px;
    padding:0; max-width:980px; margin:0 auto;
  }
  @media (max-width:760px){ .audience-grid{grid-template-columns:1fr;} .audience-card{transform:none !important;} }
  .audience-card{
    border:none; border-radius:26px;
    padding:30px 24px; text-align:center; cursor:pointer;
    transition:transform .18s, box-shadow .18s;
  }
  .audience-card:nth-child(1){ background:#fff; transform:rotate(-1.2deg) translateY(6px); }
  .audience-card:nth-child(2){ background:var(--gold-tint); transform:rotate(0.6deg) translateY(-8px); }
  .audience-card:nth-child(3){ background:var(--clay-tint); transform:rotate(-0.8deg) translateY(4px); }
  .audience-card:hover{ transform:translateY(-6px) rotate(0deg) scale(1.02); box-shadow:0 14px 28px rgba(43,42,36,0.1); }
  .audience-card h3{font-size:17px; color:var(--sage-deep); margin-bottom:8px;}
  .audience-card p{font-size:13.5px; color:var(--muted); margin:0;}

  /* IMAGES */
  .img-placeholder{
    background:linear-gradient(135deg, var(--sage-tint), var(--gold-tint));
    border-radius:20px; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:12.5px; text-align:center; padding:18px;
    width:100%; line-height:1.5;
  }
  .site-image{ width:100%; object-fit:cover; border-radius:20px; display:block; }
  .hero-flex{ display:flex; align-items:center; gap:48px; max-width:1040px; margin:0 auto; text-align:left; flex-wrap:wrap; }
  .hero-flex .hero-text{ flex:1 1 420px; text-align:left; }
  .hero-flex .hero-text .eyebrow, .hero-flex .hero-text h1, .hero-flex .hero-text p.sub{ margin-left:0; margin-right:0; }
  .hero-flex .hero-image{ flex:1 1 320px; min-width:260px; aspect-ratio:4/3; }
  @media (max-width:820px){ .hero-flex{ text-align:center; } .hero-flex .hero-text{ text-align:center; } }

  .card-image{ aspect-ratio:4/3; margin-bottom:16px; }
  .about-image{ max-width:760px; margin:0 auto 40px; aspect-ratio:16/9; }

  /* LOGO & ICONS */
  .logo img.woodmark{ height:52px; width:auto; display:block; }
  .hub-icon{ width:84px; height:84px; margin:0 auto 18px; display:block; }
  .item-icon{ width:44px; height:44px; margin-bottom:10px; display:block; }

  .subscribe-band{
    background:var(--sage-deep); color:#F3EFE6; text-align:center; padding:64px 24px;
  }
  .subscribe-band h2{ color:#fff; font-size:clamp(22px,3vw,30px); margin-bottom:10px; }
  .subscribe-band p{ color:#D9E3DC; font-size:15px; margin-bottom:26px; }
  .subscribe-form{
    display:flex; gap:10px; justify-content:center; flex-wrap:wrap; max-width:460px; margin:0 auto;
  }
  .subscribe-form input{
    flex:1; min-width:220px; padding:13px 18px; border-radius:999px; border:none; font-size:14.5px;
  }
  .subscribe-form button{
    padding:13px 26px; border-radius:999px; border:none; background:var(--gold); color:#2B2A24;
    font-weight:700; font-size:14.5px; white-space:nowrap;
  }
  .subscribe-note{ font-size:12.5px; color:#B9C6BE; margin-top:14px; }

  .page{padding:56px 24px 100px;}
  .page-header{max-width:720px; margin:0 auto 48px; text-align:center;}
  .page-header .eyebrow{margin-bottom:10px;}
  .page-header h1{font-size:clamp(26px,3.4vw,36px); color:var(--sage-deep);}
  .page-header p{color:var(--muted); font-size:16px;}

  /* COLLAPSIBLE (About) */
  .accordion{max-width:760px; margin:0 auto;}
  .acc-item{border-bottom:1px solid var(--line);}
  .acc-head{
    width:100%; background:none; border:none; text-align:left; padding:20px 0;
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:var(--sage-deep);
  }
  .acc-head .plus{font-size:20px; color:var(--gold);}
  .acc-body{padding:0 0 22px; font-size:15px; color:var(--ink); max-width:680px; white-space:pre-line;}

  /* PROGRAMME TOGGLES */
  .toggle-row{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:44px;}
  .toggle-btn{
    padding:10px 20px; border-radius:999px; border:1.5px solid var(--line); background:var(--card);
    font-size:14px; font-weight:600; color:var(--ink); transition:transform .12s;
  }
  .toggle-btn:hover{ transform:translateY(-2px); }
  .toggle-btn.active{background:var(--sage); border-color:var(--sage); color:#fff;}
  .prog-block{max-width:720px; margin:0 auto 60px; scroll-margin-top:100px;}
  .prog-block h2{font-size:22px; color:var(--sage-deep); margin-bottom:12px;}
  .prog-block p{font-size:15px; margin-bottom:14px;}
  .cta-btn{
    display:inline-block; margin-top:8px; padding:12px 24px; background:var(--gold); color:#2B2A24;
    border:none; border-radius:999px; font-weight:700; font-size:14.5px; transition:transform .12s, box-shadow .12s;
  }
  .cta-btn:hover{ transform:translateY(-2px) rotate(-0.5deg); box-shadow:0 8px 16px rgba(217,164,65,0.35); }
  .cta-btn.outline{background:none; border:1.5px solid var(--sage); color:var(--sage-deep);}

  /* EVENTS / CARDS */
  .session-list{max-width:760px; margin:0 auto; display:flex; flex-direction:column; gap:16px;}
  .session-card{
    display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap;
    background:var(--card); border:none; border-left:6px solid var(--sage);
    border-radius:18px; padding:20px 22px; box-shadow:0 2px 10px rgba(43,42,36,0.05);
  }
  .session-card.online{border-left-color:var(--plum);}
  .session-card h4{font-size:15.5px; margin-bottom:4px;}
  .session-card .meta{font-size:13px; color:var(--muted);}

  /* PASSWORD GATE */
  .gate{max-width:420px; margin:100px auto; text-align:center;}
  .gate input{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:12px; font-size:15px; margin:14px 0;
  }
  .gate .error{color:#B14A3B; font-size:13.5px;}

  footer.site-footer{border-top:1px solid var(--line); padding:40px 24px 30px; text-align:center; color:var(--muted); font-size:13px;}
  footer.site-footer .foot-links{display:flex; gap:16px; justify-content:center; flex-wrap:wrap; margin-bottom:14px; font-size:13px;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="app.js"></script>
</body>
</html>
